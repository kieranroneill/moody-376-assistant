services:
  api:
    build:
      context: ../
      dockerfile: ./build/package/api/Dockerfile.development
    container_name: moody_376_assistant_api_dev
    depends_on:
      database:
        condition: service_healthy
      model:
        condition: service_healthy
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3000}
      API_RELOAD: ${API_RELOAD:-true}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      MODEL: ${MODEL:-llama3.1:8b}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-http://model:11434}
      POSTGRES_DB: ${POSTGRES_DB:-boat_assistant}
      POSTGRES_HOST: ${POSTGRES_HOST:-database}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    image: kieranroneill/moody-376-assistant-api:development
    networks:
      - moody_376_assistant_network_dev
    ports:
      - '3000:3000'
    volumes:
      # watch for changes on source code
      - ../api:/app/api:cached
      - ../data:/app/data:cached
      - ../pyproject.toml:/app/pyproject.toml:cached

  database:
    container_name: moody_376_assistant_database_dev
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boat_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d ${POSTGRES_DB:-boat_assistant} -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - moody_376_assistant_network_dev
    ports:
      - '5432:5432'
    volumes:
      - ../.database:/var/lib/postgresql/data

  model:
    build:
      context: ../
      dockerfile: ./build/package/model/Dockerfile.development
    container_name: moody_376_assistant_model_dev
    environment:
      MODEL: ${MODEL:-llama3.1:8b}
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:11434/api/tags']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    image: kieranroneill/moody-376-assistant-model:development
    networks:
      - moody_376_assistant_network_dev
    ports:
      - '11434:11434'
    volumes:
      - ../.model:/root/.ollama

  web:
    build:
      context: ../
      dockerfile: ./build/package/web/Dockerfile.development
    container_name: moody_376_assistant_web_dev
    depends_on:
      - api
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:3000}
      NEXT_PUBLIC_LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      NODE_ENV: development
    image: kieranroneill/moody-376-assistant-web:development
    networks:
      - moody_376_assistant_network_dev
    ports:
      - '8080:8080'
    volumes:
      # watch for changes on web source code
      - ../web:/app/web:cached
      - ../package.json:/app/package.json:cached
      - ../pnpm-lock.yaml:/app/pnpm-lock.yaml:cached

networks:
  moody_376_assistant_network_dev:
    name: moody_376_assistant_network_dev
